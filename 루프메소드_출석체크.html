<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>루프메소드 출석</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
  }

  /* ── 로딩 ── */
  #loading {
    position: fixed; inset: 0; background: #1a1a1a;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 999;
  }
  #loading .logo { font-size: 22px; font-weight: 700; color: white; letter-spacing: -0.5px; margin-bottom: 20px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 헤더 ── */
  .header {
    background: #1a1a1a; color: white;
    padding: 20px 24px 16px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header-date { font-size: 14px; color: #aaa; margin-top: 4px; }
  .admin-btn {
    background: none; border: 1px solid #444; color: #888;
    font-size: 12px; padding: 6px 12px; border-radius: 20px; cursor: pointer;
  }

  /* ── 메인 ── */
  #main { display: flex; flex-direction: column; min-height: 100vh; }
  .subtitle { text-align: center; padding: 28px 0 6px; font-size: 15px; color: #666; }

  .phone-display {
    margin: 12px auto 20px; width: 220px;
    background: white; border: 2px solid #e0e0e0;
    border-radius: 16px; padding: 16px 20px; text-align: center;
  }
  .phone-display .label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .phone-display .digits {
    font-size: 36px; font-weight: 700; letter-spacing: 10px;
    color: #1a1a1a; min-height: 44px;
  }
  .phone-display .digits.empty { color: #ddd; }

  .keypad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; padding: 0 24px;
    max-width: 340px; margin: 0 auto; width: 100%;
  }
  .key {
    background: white; border: 2px solid #e8e8e8; border-radius: 14px;
    padding: 18px 0; font-size: 24px; font-weight: 600; color: #1a1a1a;
    cursor: pointer; text-align: center;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.1s; user-select: none;
  }
  .key:active { background: #eee; transform: scale(0.95); }
  .key.del { font-size: 20px; color: #888; }
  .key.confirm {
    grid-column: span 3; background: #1a1a1a; color: white;
    border-color: #1a1a1a; font-size: 17px; padding: 16px 0;
    margin-top: 4px; border-radius: 14px;
  }
  .key.confirm:active { background: #333; }
  .key.confirm.loading-btn { background: #888; border-color: #888; pointer-events: none; }

  /* ── 모달 공통 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 100;
    justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-card {
    background: white; border-radius: 24px; padding: 36px 28px;
    text-align: center; width: 300px; animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-emoji { font-size: 48px; margin-bottom: 10px; }
  .modal-title { font-size: 24px; font-weight: 800; color: #1a1a1a; margin-bottom: 4px; }
  .modal-sub { font-size: 14px; color: #888; margin-bottom: 20px; white-space: pre-line; }
  .remain-box { background: #f5f5f5; border-radius: 12px; padding: 14px; margin-bottom: 20px; }
  .remain-box .rlabel { font-size: 12px; color: #999; margin-bottom: 4px; }
  .remain-box .rcount { font-size: 34px; font-weight: 800; color: #1a1a1a; }
  .remain-box .runit { font-size: 15px; color: #555; margin-left: 2px; }
  .remain-box.warn .rcount { color: #e6a800; }
  .remain-box.danger .rcount { color: #cc0000; }
  .modal-btn {
    width: 100%; padding: 15px; border: none; border-radius: 13px;
    font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 6px;
  }
  .modal-btn.dark { background: #1a1a1a; color: white; }
  .modal-btn.gray { background: #f0f0f0; color: #333; }

  /* ── 관리자 ── */
  #admin { display: none; min-height: 100vh; background: #f5f5f5; }
  #admin.show { display: block; }
  .admin-header {
    background: #1a1a1a; color: white; padding: 20px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .admin-header h2 { font-size: 20px; font-weight: 700; }
  .back-btn {
    background: none; border: 1px solid #444; color: #aaa;
    font-size: 13px; padding: 7px 14px; border-radius: 20px; cursor: pointer;
  }
  .admin-section { padding: 20px 16px; }
  .admin-section h3 { font-size: 12px; color: #999; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600; }
  .add-form {
    background: white; border-radius: 16px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px;
  }
  .add-form input {
    border: 1.5px solid #e0e0e0; border-radius: 10px;
    padding: 12px 14px; font-size: 16px; outline: none; font-family: inherit;
  }
  .add-form input:focus { border-color: #1a1a1a; }
  .add-form button {
    background: #1a1a1a; color: white; border: none; border-radius: 10px;
    padding: 13px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .member-list { display: flex; flex-direction: column; gap: 8px; }
  .member-row {
    background: white; border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .member-row .mname { font-size: 16px; font-weight: 600; }
  .member-row .mphone { font-size: 13px; color: #aaa; margin-top: 2px; }
  .member-row .minfo { flex: 1; }
  .session-ctrl { display: flex; align-items: center; gap: 8px; }
  .session-ctrl button {
    width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #ddd;
    background: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #333;
  }
  .session-ctrl .scount { font-size: 18px; font-weight: 700; min-width: 28px; text-align: center; }
  .del-btn { background: none; border: none; color: #ddd; font-size: 20px; cursor: pointer; padding: 4px; }
  .del-btn:hover { color: #ff4d4d; }
  .history-list { background: white; border-radius: 16px; overflow: hidden; }
  .history-date-header { background: #f5f5f5; padding: 8px 16px; font-size: 12px; color: #999; font-weight: 600; }
  .history-row {
    padding: 12px 16px; display: flex; align-items: center;
    border-bottom: 1px solid #f0f0f0; font-size: 15px; gap: 8px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-row .hname { font-weight: 600; flex: 1; }
  .history-row .htime { color: #aaa; font-size: 13px; }
  .cancel-btn {
    background: none; border: 1px solid #eee; border-radius: 8px;
    color: #ccc; font-size: 12px; padding: 4px 8px; cursor: pointer; white-space: nowrap;
  }
  .cancel-btn:hover { border-color: #ff4d4d; color: #ff4d4d; }
  .empty { text-align: center; color: #bbb; padding: 30px; font-size: 14px; }

  /* ── 비밀번호 모달 ── */
  #pw-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 200;
    justify-content: center; align-items: center;
  }
  #pw-modal.show { display: flex; }
  .pw-card { background: white; border-radius: 20px; padding: 32px 28px; width: 280px; text-align: center; }
  .pw-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .pw-card input {
    width: 100%; border: 1.5px solid #e0e0e0; border-radius: 10px;
    padding: 12px; font-size: 20px; text-align: center; letter-spacing: 4px;
    outline: none; margin-bottom: 12px; font-family: inherit;
  }
  .pw-card input:focus { border-color: #1a1a1a; }
  .pw-btns { display: flex; gap: 8px; }
  .pw-btns button {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .pw-btns .confirm { background: #1a1a1a; color: white; }
  .pw-btns .cancel { background: #f0f0f0; color: #333; }
  .pw-error { color: #cc0000; font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loading">
  <div class="logo">루프메소드 본점</div>
  <div class="spinner"></div>
</div>

<!-- 메인 출석 화면 -->
<div id="main" style="display:none">
  <div class="header">
    <div>
      <div class="header-title">루프메소드 본점</div>
      <div class="header-date" id="today-date"></div>
    </div>
    <button class="admin-btn" onclick="openAdminPw()">관리자</button>
  </div>
  <div class="subtitle">전화번호 뒷자리 4자리를 입력해주세요</div>
  <div class="phone-display">
    <div class="label">전화번호 뒷 4자리</div>
    <div class="digits empty" id="digit-display">_ _ _ _</div>
  </div>
  <div class="keypad">
    <button class="key" onclick="pressKey('1')">1</button>
    <button class="key" onclick="pressKey('2')">2</button>
    <button class="key" onclick="pressKey('3')">3</button>
    <button class="key" onclick="pressKey('4')">4</button>
    <button class="key" onclick="pressKey('5')">5</button>
    <button class="key" onclick="pressKey('6')">6</button>
    <button class="key" onclick="pressKey('7')">7</button>
    <button class="key" onclick="pressKey('8')">8</button>
    <button class="key" onclick="pressKey('9')">9</button>
    <button class="key" onclick="pressKey('0')">0</button>
    <button class="key del" onclick="pressKey('')">⌫</button>
    <button class="key confirm" id="confirm-btn" onclick="confirmCheckIn()">출석</button>
  </div>
</div>

<!-- 출석 완료 팝업 -->
<div class="modal-overlay" id="popup">
  <div class="modal-card">
    <div class="modal-emoji" id="popup-emoji">✅</div>
    <div class="modal-title" id="popup-name"></div>
    <div class="modal-sub" id="popup-sub">출석 완료!</div>
    <div class="remain-box" id="popup-remain">
      <div class="rlabel">남은 횟수</div>
      <div><span class="rcount" id="popup-count"></span><span class="runit">회</span></div>
    </div>
    <button class="modal-btn dark" onclick="closePopup()">확인</button>
  </div>
</div>

<!-- 번호 못 찾은 팝업 -->
<div class="modal-overlay" id="not-found-popup">
  <div class="modal-card">
    <div class="modal-emoji">🔍</div>
    <div class="modal-title">찾을 수 없어요</div>
    <div class="modal-sub" style="margin-bottom:24px">등록된 회원이 아닙니다.<br>번호를 다시 확인해주세요.</div>
    <button class="modal-btn dark" onclick="document.getElementById('not-found-popup').classList.remove('show'); resetKeypad()">다시 입력</button>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="admin">
  <div class="admin-header">
    <h2>관리자</h2>
    <button class="back-btn" onclick="closeAdmin()">← 출석화면</button>
  </div>
  <div class="admin-section">
    <h3>회원 추가</h3>
    <div class="add-form">
      <input type="text" id="new-name" placeholder="이름" maxlength="10">
      <input type="tel" id="new-phone" placeholder="전화번호 뒷 4자리" maxlength="4" pattern="[0-9]*">
      <input type="number" id="new-sessions" placeholder="잔여 횟수" min="0" max="999">
      <button onclick="addMember()">추가</button>
    </div>
    <h3>회원 목록</h3>
    <div class="member-list" id="admin-member-list"></div>
  </div>
  <div class="admin-section">
    <h3>전체 출석 내역</h3>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<!-- 비밀번호 모달 -->
<div id="pw-modal">
  <div class="pw-card">
    <h3>🔒 관리자 확인</h3>
    <input type="password" id="pw-input" placeholder="비밀번호" maxlength="6"
      onkeydown="if(event.key==='Enter') checkPw()">
    <p class="pw-error" id="pw-error">비밀번호가 틀렸습니다</p>
    <div class="pw-btns">
      <button class="cancel" onclick="closePwModal()">취소</button>
      <button class="confirm" onclick="checkPw()">확인</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// ★ 여기에 앱스스크립트 배포 URL 입력 ★
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlgaN-cEgHzjckJwAvm7G_ybx_cCg-uApad2khDvvt97X3Hog6wdTn4RZUWRjbU2gr/exec';
// ════════════════════════════════════════

const ADMIN_PW = '1234';

// ── 로컬 캐시 ────────────────────────────
let members = [];
let history = [];

// ── API 호출 ─────────────────────────────
async function api(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url, { redirect: 'follow' });
  const text = await res.text();
  // Apps Script가 HTML 래퍼를 붙이는 경우 JSON 부분만 추출
  const match = text.match(/\{[\s\S]*\}/);
  if (match) return JSON.parse(match[0]);
  return JSON.parse(text);
}

// ── 초기 로딩 ────────────────────────────
async function init() {
  document.getElementById('today-date').textContent = formatDate(new Date());
  try {
    const data = await api({ action: 'getAll' });
    members = data.members || [];
    history = data.history || [];
  } catch (e) {
    alert('데이터 로딩 실패. 인터넷 연결 또는 URL을 확인해주세요.');
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

// ── 날짜 ─────────────────────────────────
function formatDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function formatTime(d) {
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function dateLabel(str) {
  if (str === todayStr()) return '오늘';
  const [y, m, d] = str.split('-');
  return `${y}년 ${m}월 ${d}일`;
}

// ── 키패드 ───────────────────────────────
let digits = '';
function pressKey(val) {
  if (val === '') digits = digits.slice(0, -1);
  else if (digits.length < 4) digits += val;
  updateDisplay();
}
function updateDisplay() {
  const el = document.getElementById('digit-display');
  if (digits.length === 0) { el.textContent = '_ _ _ _'; el.className = 'digits empty'; }
  else { el.textContent = digits.padEnd(4, '_').split('').join(' '); el.className = 'digits'; }
}
function resetKeypad() { digits = ''; updateDisplay(); }

// ── 출석 체크인 ──────────────────────────
async function confirmCheckIn() {
  if (digits.length < 4) return;

  const idx = members.findIndex(m => m.phone === digits);
  if (idx === -1) {
    document.getElementById('not-found-popup').classList.add('show');
    return;
  }

  const m = members[idx];

  // 오늘 이미 출석
  if (history.some(h => h.name === m.name && h.date === todayStr())) {
    showPopup('👋', m.name, '오늘 이미 출석하셨어요!', null);
    resetKeypad();
    return;
  }

  // 잔여 없음
  if (m.sessions <= 0) {
    showPopup('⚠️', m.name, '잔여 횟수가 없습니다.\n관리자에게 문의해주세요.', null);
    resetKeypad();
    return;
  }

  // 출석 처리 (낙관적 업데이트)
  const btn = document.getElementById('confirm-btn');
  btn.classList.add('loading-btn');
  btn.textContent = '처리 중...';

  const id = Date.now().toString();
  const now = new Date();
  const date = todayStr();
  const time = formatTime(now);

  // 로컬 캐시 먼저 업데이트
  members[idx].sessions -= 1;
  history.unshift({ id, name: m.name, date, time });

  const remain = members[idx].sessions;
  showPopup('✅', m.name, '출석 완료!', remain);
  resetKeypad();
  btn.classList.remove('loading-btn');
  btn.textContent = '출석';

  // 서버에 저장
  try {
    await api({ action: 'checkIn', phone: m.phone, name: m.name, date, time, id });
  } catch (e) {
    console.error('저장 실패', e);
  }
}

function showPopup(emoji, name, sub, remain) {
  document.getElementById('popup-emoji').textContent = emoji;
  document.getElementById('popup-name').textContent = name;
  document.getElementById('popup-sub').textContent = sub;
  const rb = document.getElementById('popup-remain');
  if (remain === null) {
    rb.style.display = 'none';
  } else {
    rb.style.display = '';
    rb.className = 'remain-box' + (remain === 0 ? ' danger' : remain <= 3 ? ' warn' : '');
    document.getElementById('popup-count').textContent = remain;
  }
  document.getElementById('popup').classList.add('show');
}

function closePopup() {
  document.getElementById('popup').classList.remove('show');
}
document.getElementById('popup').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});

// ── 관리자 ───────────────────────────────
function openAdminPw() {
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pw-modal').classList.add('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}
function closePwModal() { document.getElementById('pw-modal').classList.remove('show'); }
function checkPw() {
  if (document.getElementById('pw-input').value === ADMIN_PW) {
    closePwModal();
    openAdmin();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function openAdmin() {
  document.getElementById('main').style.display = 'none';
  document.getElementById('admin').classList.add('show');
  renderAdminMembers();
  renderHistory();
}
function closeAdmin() {
  document.getElementById('admin').classList.remove('show');
  document.getElementById('main').style.display = 'flex';
}

function renderAdminMembers() {
  const list = document.getElementById('admin-member-list');
  list.innerHTML = '';
  if (members.length === 0) { list.innerHTML = '<div class="empty">등록된 회원이 없습니다</div>'; return; }
  members.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = `
      <div class="minfo">
        <div class="mname">${m.name}</div>
        <div class="mphone">뒷번호 ${m.phone}</div>
      </div>
      <div class="session-ctrl">
        <button onclick="adjustSession(${i}, -1)">−</button>
        <div class="scount">${m.sessions}</div>
        <button onclick="adjustSession(${i}, +1)">+</button>
      </div>
      <button class="del-btn" onclick="deleteMember(${i})">×</button>
    `;
    list.appendChild(row);
  });
}

async function adjustSession(idx, delta) {
  const m = members[idx];
  const newVal = Math.max(0, m.sessions + delta);
  members[idx].sessions = newVal;
  renderAdminMembers();
  try { await api({ action: 'adjustSession', phone: m.phone, delta }); }
  catch (e) { console.error(e); }
}

async function deleteMember(idx) {
  const m = members[idx];
  if (!confirm(`${m.name}님을 삭제할까요?`)) return;
  members.splice(idx, 1);
  renderAdminMembers();
  try { await api({ action: 'deleteMember', phone: m.phone }); }
  catch (e) { console.error(e); }
}

async function addMember() {
  const name = document.getElementById('new-name').value.trim();
  const phone = document.getElementById('new-phone').value.trim();
  const sessions = parseInt(document.getElementById('new-sessions').value);
  if (!name) { alert('이름을 입력해주세요'); return; }
  if (!/^\d{4}$/.test(phone)) { alert('전화번호 뒷 4자리를 입력해주세요'); return; }
  if (isNaN(sessions) || sessions < 0) { alert('횟수를 입력해주세요'); return; }
  if (members.find(m => m.phone === phone)) { alert('이미 등록된 번호입니다'); return; }

  members.push({ name, phone, sessions });
  document.getElementById('new-name').value = '';
  document.getElementById('new-phone').value = '';
  document.getElementById('new-sessions').value = '';
  renderAdminMembers();
  try { await api({ action: 'addMember', name, phone, sessions }); }
  catch (e) { console.error(e); }
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (history.length === 0) { list.innerHTML = '<div class="empty">출석 기록이 없습니다</div>'; return; }
  const groups = {};
  history.forEach(h => { if (!groups[h.date]) groups[h.date] = []; groups[h.date].push(h); });
  list.innerHTML = '';
  Object.keys(groups).forEach(date => {
    const header = document.createElement('div');
    header.className = 'history-date-header';
    header.textContent = dateLabel(date);
    list.appendChild(header);
    groups[date].forEach(h => {
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `
        <span class="hname">${h.name}</span>
        <span class="htime">${h.time}</span>
        <button class="cancel-btn" onclick="cancelCheckIn('${h.id}', '${h.name}')">취소</button>
      `;
      list.appendChild(row);
    });
  });
}

async function cancelCheckIn(id, name) {
  if (!confirm(`${name}님의 출석을 취소하고 횟수를 1회 복구할까요?`)) return;

  // 로컬 캐시 업데이트
  const hIdx = history.findIndex(h => h.id === id);
  if (hIdx !== -1) history.splice(hIdx, 1);
  const mIdx = members.findIndex(m => m.name === name);
  if (mIdx !== -1) members[mIdx].sessions += 1;

  renderHistory();
  renderAdminMembers();

  try { await api({ action: 'cancelCheckIn', id, name }); }
  catch (e) { console.error(e); }
}

// ── 시작 ─────────────────────────────────
init();
</script>
